<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企业入驻 | 加入铝箔世界平台 | Alfoil World</title>
<meta name="description" content="面向铝箔制造商、加工企业和产业服务商的企业入驻页面，展示品牌能力、国际市场经验和合作价值。">
<link rel="icon" type="image/png" href="assets/images/logo-aw.png">
<link rel="apple-touch-icon" href="assets/images/logo-aw.png">
<link rel="stylesheet" href="site-pages.css">
<script src="site-shell.js" defer></script>
</head>
<body data-page="join">
<div data-site-header></div>
<main>
  <section class="page-hero">
    <div class="container">
      <div class="hero-shell">
        <div class="hero-grid">
          <div>
            <div class="eyebrow">Join Platform</div>
            <h1>企业入驻入口</h1>
            <p>为铝箔企业、设备商、材料服务商提供品牌展示与目录入驻入口，后续可扩展为企业详情页、产品页和线索收集体系。</p>
          </div>
          <aside class="hero-side">
            <h3>适合入驻对象</h3>
            <ul>
              <li>铝箔制造企业</li>
              <li>设备与辅材服务商</li>
              <li>出口型品牌与贸易支持团队</li>
            </ul>
          </aside>
        </div>
      </div>
    </div>
  </section>
  <section class="section">
    <div class="container section-shell">
      <div class="grid-3">
        <article class="card"><h3>品牌展示</h3><p>展示企业定位、产品方向、市场能力和核心优势。</p></article>
        <article class="card"><h3>目录收录</h3><p>进入平台供应商目录，提高海外买家初筛触达率。</p></article>
        <article class="card"><h3>询盘承接</h3><p>与后续采购询盘中心联动，形成更清晰的线索承接机制。</p></article>
      </div>
      <div class="card" style="margin-top: 18px;">
        <h3>入驻申请表单</h3>
        <form class="form-grid">
          <div class="field"><label for="j-company">企业名称</label><input id="j-company" type="text" placeholder="企业全称"></div>
          <div class="field"><label for="j-contact">联系人</label><input id="j-contact" type="text" placeholder="姓名 / 职务"></div>
          <div class="field"><label for="j-type">企业类型</label><input id="j-type" type="text" placeholder="制造商 / 设备商 / 服务商"></div>
          <div class="field"><label for="j-market">重点市场</label><input id="j-market" type="text" placeholder="国内 / 出口 / 重点区域"></div>
          <div class="field-full"><label for="j-desc">企业简介</label><textarea id="j-desc" placeholder="请说明产品方向、产能、优势和合作诉求"></textarea></div>
        </form>
        <div class="cta-row">
          <a class="btn btn-primary" href="mailto:contact@alfoilworld.com?subject=Join%20Alfoil%20World">通过邮件提交入驻申请</a>
          <a class="btn btn-secondary" href="contact.html">联系平台商务</a>
        </div>
      </div>
    </div>
  </section>
</main>
<div data-site-footer></div>
</body>
</html>
