<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企业入驻 | 加入铝箔世界平台 | Alfoil World</title>
<meta name="description" content="了解铝箔制造企业及相关服务商如何加入铝箔世界，提升海外市场可见度并进入平台供应商目录。">
<link rel="icon" type="image/png" href="assets/images/logo-aw.png">
<link rel="apple-touch-icon" href="assets/images/logo-aw.png">
<link rel="stylesheet" href="site-pages.css">
<script src="site-shell.js" defer></script>
</head>
<body data-page="join" data-locale="zh">
<div data-site-header></div>
<main>
  <section class="page-hero">
    <div class="container">
      <div class="hero-shell">
        <div class="hero-grid">
          <div>
            <div class="eyebrow">企业入驻</div>
            <h1>加入铝箔世界平台</h1>
            <p>本页面向铝箔制造企业、加工企业以及产业服务商，帮助企业建立更适合国际买家理解的展示入口与商务联系路径。</p>
          </div>
          <aside class="hero-side">
            <h3>适合对象</h3>
            <ul>
              <li>铝箔制造商与深加工企业</li>
              <li>设备、材料与工艺服务商</li>
              <li>希望提升海外可见度的出口业务团队</li>
            </ul>
          </aside>
        </div>
      </div>
    </div>
  </section>
  <section class="section">
    <div class="container section-shell">
      <div class="grid-3">
        <article class="card"><h3>企业能力展示</h3><p>更清楚地展示应用方向、产品路线、出口画像和核心能力，让海外买家更快理解你的定位。</p></article>
        <article class="card"><h3>目录收录机会</h3><p>进入平台供应商目录，在买家首轮筛选中获得更高质量的曝光。</p></article>
        <article class="card"><h3>商务联系承接</h3><p>让企业展示与询盘、联系动作相连接，而不是停留在静态介绍层面。</p></article>
      </div>
      <div class="card" style="margin-top: 18px;">
        <h3>入驻申请表单</h3>
        <form class="form-grid">
          <div class="field"><label for="j-company">企业名称</label><input id="j-company" type="text" placeholder="企业全称或品牌名"></div>
          <div class="field"><label for="j-contact">联系人</label><input id="j-contact" type="text" placeholder="姓名 / 职务"></div>
          <div class="field"><label for="j-type">企业类型</label><input id="j-type" type="text" placeholder="制造商 / 加工商 / 服务商"></div>
          <div class="field"><label for="j-market">重点市场</label><input id="j-market" type="text" placeholder="国内 / 出口 / 重点区域"></div>
          <div class="field-full"><label for="j-desc">企业简介</label><textarea id="j-desc" placeholder="请说明产品方向、制造能力、出口经验与希望平台重点展示的内容。"></textarea></div>
        </form>
        <div class="cta-row">
          <a class="btn btn-primary" href="mailto:contact@alfoilworld.com?subject=Join%20Alfoil%20World">提交入驻申请</a>
          <a class="btn btn-secondary" href="contact.html">联系我们</a>
        </div>
      </div>
    </div>
  </section>
</main>
<div data-site-footer></div>
</body>
</html>
