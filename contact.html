<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>联系我们 | 商务合作与采购支持 | Alfoil World</title>
<meta name="description" content="联系 Alfoil World 商务团队，获取采购支持、企业合作、平台咨询和国际市场对接服务。">
<link rel="icon" type="image/png" href="assets/images/logo-aw.png">
<link rel="apple-touch-icon" href="assets/images/logo-aw.png">
<link rel="stylesheet" href="site-pages.css">
<script src="site-shell.js" defer></script>
</head>
<body data-page="contact">
<div data-site-header></div>
<main>
  <section class="page-hero">
    <div class="container">
      <div class="hero-shell">
        <div class="hero-grid">
          <div>
            <div class="eyebrow">Contact</div>
            <h1>联系我们</h1>
            <p>承接首页的联系动作，方便采购咨询、内容合作、企业展示与平台商务沟通。</p>
            <div class="hero-actions">
              <a class="btn btn-primary" href="mailto:contact@alfoilworld.com">发送邮件</a>
              <a class="btn btn-secondary" href="global-inquiry.html">采购询盘</a>
            </div>
          </div>
          <aside class="hero-side">
            <h3>联系方向</h3>
            <ul>
              <li>内容合作</li>
              <li>采购对接</li>
              <li>企业入驻</li>
              <li>品牌展示</li>
            </ul>
          </aside>
        </div>
      </div>
    </div>
  </section>
  <section class="section">
    <div class="container section-shell">
      <div class="grid-2">
        <article class="card">
          <h3>联系方式</h3>
          <ul class="card-list">
            <li>邮箱：contact@alfoilworld.com</li>
            <li>平台定位：Global Portal · Supplier Network · Industry Intelligence</li>
            <li>合作方向：内容合作 / 采购对接 / 企业入驻</li>
          </ul>
        </article>
        <article class="card">
          <h3>留言表单</h3>
          <form class="form-grid">
            <div class="field"><label for="c-name">姓名</label><input id="c-name" type="text"></div>
            <div class="field"><label for="c-mail">邮箱</label><input id="c-mail" type="email"></div>
            <div class="field-full"><label for="c-msg">留言内容</label><textarea id="c-msg"></textarea></div>
          </form>
        </article>
      </div>
    </div>
  </section>
</main>
<div data-site-footer></div>
</body>
</html>
