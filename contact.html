<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>联系我们 | 商务合作与采购支持 | Alfoil World</title>
<meta name="description" content="联系铝箔世界团队，获取采购支持、企业入驻、平台合作与国际市场沟通相关帮助。">
<link rel="icon" type="image/png" href="assets/images/logo-aw.png">
<link rel="apple-touch-icon" href="assets/images/logo-aw.png">
<link rel="stylesheet" href="site-pages.css">
<script src="site-shell.js" defer></script>
</head>
<body data-page="contact" data-locale="zh">
<div data-site-header></div>
<main>
  <section class="page-hero">
    <div class="container">
      <div class="hero-shell">
        <div class="hero-grid">
          <div>
            <div class="eyebrow">联系我们</div>
            <h1>联系铝箔世界团队</h1>
            <p>这个页面用于承接采购支持、企业入驻、平台合作、内容共建与国际业务沟通等需求。</p>
            <div class="hero-actions">
              <a class="btn btn-primary" href="mailto:contact@alfoilworld.com">发送邮件</a>
              <a class="btn btn-secondary" href="global-inquiry.html">提交询盘</a>
            </div>
          </div>
          <aside class="hero-side">
            <h3>常见联系事项</h3>
            <ul>
              <li>采购支持与供应商沟通前准备</li>
              <li>企业入驻与目录收录咨询</li>
              <li>内容合作与市场联动</li>
              <li>平台介绍与对外商务沟通</li>
            </ul>
          </aside>
        </div>
      </div>
    </div>
  </section>
  <section class="section">
    <div class="container section-shell">
      <div class="grid-2">
        <article class="card">
          <h3>联系信息</h3>
          <ul class="card-list">
            <li>邮箱：contact@alfoilworld.com</li>
            <li>服务范围：供应商发现、市场洞察、采购路径、询盘引导</li>
            <li>适合事项：合作咨询、采购支持、企业入驻、商务沟通</li>
          </ul>
        </article>
        <article class="card">
          <h3>留言表单</h3>
          <form class="form-grid">
            <div class="field"><label for="c-name">姓名</label><input id="c-name" type="text" placeholder="你的姓名"></div>
            <div class="field"><label for="c-mail">邮箱</label><input id="c-mail" type="email" placeholder="name@company.com"></div>
            <div class="field-full"><label for="c-msg">留言内容</label><textarea id="c-msg" placeholder="请简要说明你的需求或合作方向。"></textarea></div>
          </form>
        </article>
      </div>
    </div>
  </section>
</main>
<div data-site-footer></div>
</body>
</html>
